external_components:
  - source:
      type: git
      url: https://github.com/jbunting/esphome-gdo
      # renovate: datasource=github-releases depName=jbunting/esphome-gdo
      ref: 2026.7.0
    components: [secplus_gdo]
    refresh: 1d

esphome:
  name: garage-doors
  friendly_name: Garage Doors

esp32:
  board: esp32-s3-devkitc-1

safe_mode:

preferences:
  flash_write_interval: 1min

text_sensor:
  - platform: version
    name: "Firmware Version"

# Console on USB-Serial-JTAG frees all three hardware UARTs (0/1/2) for the
# openers below, while keeping logs + improv_serial provisioning over USB.
# Connect to the S3 devkit's native USB port (not the UART bridge port).
logger:
  hardware_uart: USB_SERIAL_JTAG

web_server:
  port: 80
  local: true

prometheus:

# Enable Home Assistant API
api:
  encryption:

ota:
  - platform: esphome

# Remove this once we add ethernet.
# WiFi is provisioned at bootstrap via improv/captive portal — credentials are
# never baked into the image. See scripts/push.sh.
wifi:
  ap:
    ssid: rescue-garage-doors

captive_portal:

improv_serial:

# ethernet:
#   type: W5500
#   clk_pin: GPIO13
#   mosi_pin: GPIO11
#   miso_pin: GPIO12
#   cs_pin: GPIO14
#   interrupt_pin: GPIO10
#   reset_pin: GPIO9
output:
  - id: warning_led_output
    platform: gpio
    pin: GPIO10

button:
  - platform: restart
    name: "Garage Door Restart"
    id: restart_button

# --- Security+ garage door openers (jbunting/esphome-gdo) ---
#
# Three openers, one per hardware UART (0/1/2). gdolib remaps each UART to the
# tx/rx pins below via the GPIO matrix.
#
# ⚠️ PLACEHOLDER PINS — set tx_pin/rx_pin to match your actual wiring before
# flashing. Avoid GPIO10 (warning LED), GPIO19/20 (USB), and the flash/PSRAM
# pins. invert_uart is standard for the Security+ signal.
secplus_gdo:
  - id: gdo_jeep
    uart_num: 0
    tx_pin: GPIO4
    rx_pin: GPIO5
    invert_uart: true
  - id: gdo_van
    uart_num: 1
    tx_pin: GPIO6
    rx_pin: GPIO7
    invert_uart: true
  - id: gdo_toy
    uart_num: 2
    tx_pin: GPIO15
    rx_pin: GPIO16
    invert_uart: true

cover:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_jeep
    name: Jeep
    device_class: garage
  - platform: secplus_gdo
    secplus_gdo_id: gdo_van
    name: Van
    device_class: garage
  - platform: secplus_gdo
    secplus_gdo_id: gdo_toy
    name: Toy
    device_class: garage

light:
  # Warning indicator (not tied to a door).
  - id: warning_led
    platform: binary
    output: warning_led_output
    effects:
      - strobe:
    internal: true
  - platform: secplus_gdo
    secplus_gdo_id: gdo_jeep
    name: Jeep Light
  - platform: secplus_gdo
    secplus_gdo_id: gdo_van
    name: Van Light
  - platform: secplus_gdo
    secplus_gdo_id: gdo_toy
    name: Toy Light
