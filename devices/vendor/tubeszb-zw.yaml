# Vendored + adapted from TubesZB's maintained Z-Wave config:
#   github://tube0013/TubesZB-ESPHome-Builder/esphome-config/tubeszb-zw.yaml
#
# This replaces the old tube_gateways zw-kit package, which pulled oxan's
# stream_server (a raw TCP serial bridge) that no longer compiles on esphome
# 2026.7.0. TubesZB's rewrite drops the external stream_server entirely and uses
# ESPHome's native `zwave_proxy` component — so Z-Wave now integrates through
# Home Assistant's ESPHome + Z-Wave path rather than a tcp://:6638 socket.
#
# Local adaptations vs upstream:
#   - name/project come from common/core.yaml; ota + http_request from
#     common/cicd.yaml (our OTA auto-update)
#   - manual_ip placeholders removed (use DHCP)
#   - custom web UI js (../www3TZB.js) dropped; default web_server v3 UI is used

esphome:
  min_version: 2026.3.2

esp32:
  board: esp32-poe
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - esp_http_client
        - esp_crt_bundle
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_PM_ENABLE: "n"
      CONFIG_PM_POWER_DOWN_PERIPHERAL_IN_LIGHT_SLEEP: "n"
      CONFIG_UART_ISR_IN_IRAM: "y"

# Olimex ESP32-PoE Ethernet
ethernet:
  id: ethernet0
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO17
    mode: CLK_OUT
  phy_addr: 0
  power_pin: GPIO12
  on_connect:
    then:
      - script.execute: on_ethernet_connect

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 0s

interval:
  - interval: 7d
    startup_delay: 7d
    then:
      - script.execute: check_connectivity

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: info_group
      name: "Device Information"
      sorting_weight: 10
    - id: device_control_group
      name: "Device Controls"
      sorting_weight: 20

globals:
  - id: has_internet
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: on_ethernet_connect
    mode: single
    then:
      - logger.log: "Ethernet Link Detected. Waiting for IP assignment..."
      - wait_until:
          condition:
            lambda: |-
              auto addresses = id(ethernet0).get_ip_addresses();
              return !addresses.empty() && addresses[0].is_set();
          timeout: 30s
      - logger.log: "IP Assigned. Starting connectivity check..."
      - script.execute: check_connectivity

  - id: check_connectivity
    then:
      - if:
          condition:
            lambda: 'return id(ethernet0).is_connected();'
          then:
            - http_request.get:
                url: https://www.google.com/generate_204
                on_response:
                  then:
                    - lambda: 'id(has_internet) = (response->status_code == 204);'
          else:
            - logger.log: "Ethernet not ready yet. Skipping connectivity check."

button:
  - platform: restart
    name: "Restart the Device"
    icon: mdi:restart
    web_server:
      sorting_group_id: device_control_group
      sorting_weight: 10

uart:
  id: uart_bus
  rx_pin: GPIO16
  tx_pin: GPIO5
  baud_rate: 115200
  rx_buffer_size: 1024

zwave_proxy:
  uart_id: uart_bus

mdns:
  services:
    - service: "_zwave"
      protocol: "_esphome"
      txt:
        version: 1
        name: "TubesZB"
        serial_number: !lambda 'return esphome::get_mac_address();'

text_sensor:
  - platform: template
    name: "TubesZB ESPHome FW Version"
    id: project_version
    entity_category: "diagnostic"
    icon: mdi:information-box
    update_interval: 24h
    web_server:
      sorting_group_id: info_group
      sorting_weight: 10
    lambda: |-
      return { ESPHOME_PROJECT_VERSION };

  - platform: ethernet_info
    ip_address:
      name: ESP IP Address
      icon: mdi:ip-network-outline
      web_server:
        sorting_group_id: info_group
        sorting_weight: 20
    mac_address:
      name: ESP MAC Address
      icon: mdi:network-outline
      web_server:
        sorting_group_id: info_group
        sorting_weight: 30

  - platform: template
    name: "Documentation"
    update_interval: 24h
    icon: mdi:file-document-outline
    lambda: 'return {"https://tubeszb.com/documentation"};'
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: info_group
      sorting_weight: 40
