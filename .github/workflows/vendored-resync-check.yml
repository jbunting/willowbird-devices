name: vendored-resync

# Fails a PR that bumps a vendored file's `# vendored-from:` digest without
# actually re-syncing the file when upstream changed it. Digest-only bumps for
# unchanged upstream files pass. See scripts/check_vendored_resync.py.
#
# Runs on EVERY PR (no paths filter) on purpose: so it can be a required status
# check without blocking PRs that don't touch devices/vendor/. The script
# no-ops to success when no vendored file changed, so it always reports a status.
on:
  pull_request:

jobs:
  vendored-resync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check vendored files are re-synced when upstream changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/check_vendored_resync.py
