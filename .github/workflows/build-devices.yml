# .github/workflows/build-devices.yml
name: Build and Release ESPHome Devices

on:
  push:
    branches: [ main ]
    paths:
      - 'devices/**'
      - 'components/**'
      - 'packages/**'
      - 'requirements.txt'
      - '.github/workflows/build-devices.yml'
  workflow_dispatch: {}

permissions:
  contents: write   # needed for releases

jobs:
  build-devices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute version
        id: version
        run: |
          # CalVer: YYYY.MM.DD.<build> — build monotonically increases per run
          version="$(date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building version $version"

      - name: Compile device binaries
        run: |
          mkdir -p dist
          for f in devices/*.yaml; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .yaml)
            echo "::group::Building $name"
            esphome -s version "$VERSION" compile "$f"
            bin=$(find devices/.esphome/build/$name/.pioenvs -name 'firmware.bin' | head -n1)
            if [ -f "$bin" ]; then
              cp "$bin" "dist/${name}.bin"
              echo "✅ Built $name → dist/${name}.bin"
            else
              echo "❌ Failed to find binary for $name"
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Generate manifests
        run: |
          for f in dist/*.bin; do
            name=$(basename "$f" .bin)
            manifest="dist/${name}-manifest.json"

            # chipFamily must equal the compiled ESPHOME_VARIANT (e.g. ESP32, ESP32-S3);
            # the OTA update component matches on `chipFamily == ESPHOME_VARIANT`.
            chip="ESP32"
            defines="devices/.esphome/build/${name}/src/esphome/core/defines.h"
            if [ -f "$defines" ]; then
              variant=$(grep -m1 'ESPHOME_VARIANT' "$defines" | sed -E 's/.*"([^"]+)".*/\1/')
              [ -n "$variant" ] && chip="$variant"
            fi

            # Point OTA at the immutable versioned release asset so a frozen device
            # keeps pulling the exact build it was pinned to.
            url="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${name}.bin"
            md5=$(md5sum "$f" | cut -d' ' -f1)

            {
              printf '{\n'
              printf '  "name": "%s",\n' "$name"
              printf '  "version": "%s",\n' "$VERSION"
              printf '  "builds": [\n'
              printf '    {"chipFamily": "%s", "ota": {"md5": "%s", "path": "%s"}}\n' "$chip" "$md5" "$url"
              printf '  ]\n'
              printf '}\n'
            } > "$manifest"

            echo "::group::$manifest"
            cat "$manifest"
            echo "::endgroup::"
          done

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Device Builds
          body: "Rolling release — always the newest build. Currently: ${{ steps.version.outputs.version }}"
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
