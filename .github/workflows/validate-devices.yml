# .github/workflows/validate-devices.yml
name: Validate ESPHome Devices

# Compile-check device configs on PRs. This does NOT release anything — the
# release pipeline lives in build-devices.yml and only runs on main.
on:
  pull_request:
    paths:
      - 'devices/**'
      - 'components/**'
      - 'packages/**'
      - 'requirements.txt'
      - '.github/workflows/validate-devices.yml'
  workflow_dispatch: {}

jobs:
  validate-devices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # No secrets step: configs must not use !secret (enforced by
      # lint-configs.yml), so a compile check needs no credentials.

      - name: Compile device configs
        run: |
          failed=0
          for f in devices/*.yaml; do
            [ -e "$f" ] || continue
            echo "::group::Compiling $f"
            if esphome compile "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            echo "One or more device configs failed to compile."
            exit 1
          fi
